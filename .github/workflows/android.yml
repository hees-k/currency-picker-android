name: Android CI

on:
  push:
    tags:
      - 'currency-picker-*'
      
  # workflow_dispatch:
  #   inputs:
  #     should-publish:
  #       type: boolean
  #       description: "Do you want to publish the library?"
  #       default: false
  #       required: true

  #     release-version:
  #       type: string
  #       description: "Specify the version to release"
  #       required: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Extract version from tag
      id: vars
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/currency-picker-}" >> $GITHUB_ENV
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build

    - name: Publish to GitHub Package Registry 🚀
      run: bash ./gradlew :currencypicker:publish --info
      env:
        GPR_USER: ${{ github.actor }}
        GPR_KEY: ${{ secrets.PAT_TOKEN }}
        RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

    - name: Upload Library AAR 🗳
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.PAT_TOKEN }}
        # repository: ${{ github.repository }}
        repository: hees-k/forked_libraries
        tag_name: currency-picker-${{ env.RELEASE_VERSION }}
        files: currencypicker/build/outputs/aar/currencypicker-release.aar
